name: Deploy Site

on:
  push:
    branches:
      - main
      - master
    paths:
      - "Banner.png"
      - "Menu Bar Icon.png"
      - "scripts/prepare-site-assets.ts"
      - "scripts/prerender-site.tsx"
      - "site/**"
      - "vite.site.config.ts"
      - "tsconfig.site.json"
      - "tsconfig.node.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/site-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Set up Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build site
        env:
          SITE_BASE: ${{ vars.SITE_BASE }}
          VITE_SITE_APP_STORE_URL: ${{ vars.SITE_APP_STORE_URL }}
          VITE_SITE_URL: ${{ vars.SITE_URL }}
        run: bun run build:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
